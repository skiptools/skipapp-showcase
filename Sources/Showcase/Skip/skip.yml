# Configuration file for the Showcase module (https://skip.dev).
#
# mode: 'automatic' lets skipstone decide between 'native' (Skip Fuse) and
# 'transpiled' (Skip Lite) based on whether the SkipFuse module appears in
# the resolved dependency graph. When SKIP_MODE=fuse is set in the environment,
# Package.swift wires in SkipFuseUI (which pulls SkipFuse), so this becomes
# 'native'. Otherwise it stays 'transpiled'.
skip:
  mode: 'automatic'

build:
  contents:
    - block: 'dependencies'
      contents:
        # dependency used by MapPlayground for custom compose integration
        - 'implementation("com.google.maps.android:maps-compose:6.4.1")'
